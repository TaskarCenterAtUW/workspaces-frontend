name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Runs `nuxt prepare` via the postinstall hook, which generates the .nuxt
      # types + eslint typegen that both `lint` and `typecheck` rely on.
      - name: Install dependencies
        run: npm ci

      # The quality steps below use `if: ${{ !cancelled() }}` so every check runs
      # and reports its own result even when an earlier one fails.
      - name: Lint
        if: ${{ !cancelled() }}
        run: npm run lint

      - name: Type check
        if: ${{ !cancelled() }}
        run: npm run typecheck

      - name: Unit tests
        if: ${{ !cancelled() }}
        run: npm test

      - name: Install Playwright browser
        if: ${{ !cancelled() }}
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        if: ${{ !cancelled() }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
